name: Weekly spend suggestions

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: suggestion_service
        run: pip install -r requirements.txt
      - name: Run poller
        working-directory: suggestion_service
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python run_poller.py
